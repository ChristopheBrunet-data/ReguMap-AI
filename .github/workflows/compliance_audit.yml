name: Compliance Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Run S1 Compliance Audit (Terminology)
      run: python backend/audit/audit_s1_compliance.py
    - name: Run S2 Infrastructure Audit (Network)
      run: python backend/audit/audit_s2_network.py
    - name: Run S3 Data Pipeline Audit (Ingestion)
      run: python backend/audit/audit_s3_pipeline.py
    - name: Run S4 Explainability Audit (XAI)
      run: python backend/audit/audit_s4_explainability.py
