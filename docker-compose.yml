version: '3.8'

services:
  # 1. Graph Database (Internal)
  neo4j:
    image: neo4j:5.15
    container_name: aeromind-neo4j
    networks:
      - private_ai_net
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    # Only exposing for debug if needed, but per instructions we keep it internal
    # ports:
    #   - "7474:7474"
    #   - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. IA Engine / Backend (Isolated)
  python-backend:
    build:
      context: ./backend
    container_name: aeromind-python-backend
    networks:
      - private_ai_net
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      neo4j:
        condition: service_healthy

  # 3. API Gateway / Orchestrator (External Boundary)
  node-gateway:
    build:
      context: ./gateway
    container_name: aeromind-node-gateway
    networks:
      - public_net
      - private_ai_net
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://python-backend:8000
    depends_on:
      - python-backend

  # 4. Interactive Dashboard / Frontend (Public Facing)
  frontend:
    build:
      context: ./frontend
    container_name: aeromind-frontend
    networks:
      - public_net
    ports:
      - "80:80"
    depends_on:
      - node-gateway

networks:
  public_net:
    driver: bridge
  private_ai_net:
    internal: true
